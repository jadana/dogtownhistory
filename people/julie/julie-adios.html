<H2 align="center"><STRONG>ADIOS</STRONG></H2>
<h3 align="center">By:  Julie Duane</h3>
<p></p><p></p>
<p><blockquote><blockquote><blockquote><blockquote><blockquote><blockquote>
I can't live with any man that<br><br>
Will tell me he detests my cat<br><br> 
So adios, ciao, and here's your hat<br><br> 
Goodbye, so long, to-ta and SCAT
</blockquote></blockquote></blockquote></blockquote></blockquote></blockquote></p>
